services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-laudoia}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      APP_NAME: ${APP_NAME:-LaudoIA Pericial API}
      APP_ENV: ${APP_ENV:-development}
      APP_URL: ${APP_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-yusley.santos23@gmail.com}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/laudoia}
      UPLOAD_DIR: ${UPLOAD_DIR:-storage/uploads}
      REPORT_TEMPLATE_PATH: ${REPORT_TEMPLATE_PATH:-app/assets/report_template.docx}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-}
      MERCADO_PAGO_WEBHOOK_URL: ${MERCADO_PAGO_WEBHOOK_URL:-http://localhost:8000/api/v1/billing/webhooks/mercado-pago}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-openrouter/owl-alpha}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_REQUEST_TIMEOUT_SECONDS: ${OPENROUTER_REQUEST_TIMEOUT_SECONDS:-25}
      OPENROUTER_FREE_MODEL_MAX_ATTEMPTS: ${OPENROUTER_FREE_MODEL_MAX_ATTEMPTS:-1}
      USD_BRL_RATE: ${USD_BRL_RATE:-5.20}
      CREDIT_VALUE_BRL: ${CREDIT_VALUE_BRL:-1.00}
      PLATFORM_MARGIN_MULTIPLIER: ${PLATFORM_MARGIN_MULTIPLIER:-1.35}
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./.env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_storage:
